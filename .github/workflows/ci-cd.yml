name: DSAverse CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==================== Backend Build Job ====================
  build-backend:
    name: Build & Verify Backend (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd backend
          ./apache-maven-3.9.6/bin/mvn clean package -DskipTests

  # ==================== Frontend Build Job ====================
  build-frontend:
    name: Build & Verify Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Application
        env:
          NEXT_PUBLIC_API_URL: https://dsa-master-rcfh.onrender.com/api
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          cd frontend
          npm run build
