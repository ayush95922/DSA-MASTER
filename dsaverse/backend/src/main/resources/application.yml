# ============================================================
# DSAverse Application Configuration
# ============================================================

spring:
  application:
    name: dsaverse

  # ==================== Database ====================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dsaverse}
    username: ${DB_USERNAME:dsaverse}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ==================== Flyway ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ==================== Redis ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  # ==================== RabbitMQ ====================
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:dsaverse}
    password: ${RABBITMQ_PASSWORD}

  # ==================== Mail ====================
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # ==================== Jackson ====================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # ==================== Servlet ====================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ==================== Server ====================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ==================== Application Custom Properties ====================
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  mail:
    from: ${MAIL_FROM:noreply@dsaverse.com}
    base-url: ${APP_BASE_URL:http://localhost:3000}

# ==================== SpringDoc ====================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ==================== Actuator ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# ==================== Logging ====================
logging:
  level:
    root: INFO
    com.dsaverse: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
